<!DOCTYPE html>
<html>
<head>
  <title>luca.love</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    img {
      max-width: 90%;
      max-height: 90%;
    }

    button {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: transparent;
      color: white;
      border: 1px solid white;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
    }

    button:hover {
      background: white;
      color: black;
    }
  </style>
</head>
<body>
  <img src="luca.gif" alt="luca gif">

  <button id="learn-btn">LEARN MORE</button>

  <audio id="bg-audio" loop>
    <source src="sound.mp3" type="audio/mpeg">
  </audio>

  <script>
    const button = document.getElementById("learn-btn");
    const audio = document.getElementById("bg-audio");

    button.addEventListener("click", function () {
      audio.play();
      button.style.display = "none";
    });
  </script>
</body>
</html>
